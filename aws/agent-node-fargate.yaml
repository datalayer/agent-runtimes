AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Datalayer Agent Node on AWS Fargate.
  Creates a dedicated VPC with two public subnets, an ECS cluster,
  a Fargate service running the agent-node container, and an
  Application Load Balancer that exposes the node publicly.

Parameters:

  DatalayerApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: >
      (Optional) Datalayer API key used by the node to authenticate with the
      platform. When empty, the node starts unauthenticated and shows a
      sign-in screen at the public URL where the user can paste their key.
      When provided, the node exchanges it for a session token at startup and
      the sign-in screen is skipped. Security note: this injects a long-lived
      secret into infrastructure; only use behind TLS and restricted ingress
      (private CIDR/VPN/WAF), and prefer short-lived interactive sign-in for
      internet-facing deployments.

  AllowedHttpCidr:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach the public ALB listener on port 80. For production,
      set to your corporate egress IP(s) or front this stack with HTTPS + WAF.

  DatalayerRunUrl:
    Type: String
    Default: https://prod1.datalayer.run
    Description: Datalayer platform base URL.

  DatalayerAiInferenceUrl:
    Type: String
    Default: ''
    Description: >
      (Optional) Dedicated ai-inference base URL. When empty, the template
      falls back to DatalayerRunUrl.

  AgentNodeImage:
    Type: String
    Default: datalayer/agent-nodes:latest
    Description: Docker image of the agent-node to run.

  AgentNodePort:
    Type: Number
    Default: 8765
    Description: TCP port the agent-node listens on.

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: Fargate task CPU units.

  TaskMemory:
    Type: String
    Default: '2048'
    Description: Fargate task memory (MiB). Must be valid for the chosen CPU.

  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of agent-node tasks to run.

Conditions:
  HasDatalayerAiInferenceUrl: !Not
    - !Equals [!Ref DatalayerAiInferenceUrl, '']

Resources:

  # --- Networking ---------------------------------------------------------

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-a'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-b'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # --- Security groups ----------------------------------------------------

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: Allow HTTP traffic to the ALB from AllowedHttpCidr.
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
          Description: HTTP from configured CIDR.
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb-sg'

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: Allow ALB to reach the agent-node tasks.
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-svc-sg'

  ServiceIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ServiceSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref AgentNodePort
      ToPort: !Ref AgentNodePort
      SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      Description: Agent node port from ALB.

  # --- Load balancer ------------------------------------------------------

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: VpcGatewayAttachment
    Properties:
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: !Ref AgentNodePort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # --- ECS / Fargate ------------------------------------------------------

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}-agent-node'
      RetentionInDays: 14

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-agent-node'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: agent-node
          Image: !Ref AgentNodeImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref AgentNodePort
              Protocol: tcp
          Environment:
            - Name: DATALAYER_API_KEY
              Value: !Ref DatalayerApiKey
            - Name: DATALAYER_RUN_URL
              Value: !Ref DatalayerRunUrl
            - Name: VITE_DATALAYER_RUN_URL
              Value: !Ref DatalayerRunUrl
            - Name: DATALAYER_AI_INFERENCE_URL
              Value: !If
                - HasDatalayerAiInferenceUrl
                - !Ref DatalayerAiInferenceUrl
                - !Ref DatalayerRunUrl
            - Name: VITE_DATALAYER_AI_INFERENCE_URL
              Value: !If
                - HasDatalayerAiInferenceUrl
                - !Ref DatalayerAiInferenceUrl
                - !Ref DatalayerRunUrl
            - Name: AGENT_RUNTIMES_PORT
              Value: !Ref AgentNodePort
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: agent-node

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      LoadBalancers:
        - ContainerName: agent-node
          ContainerPort: !Ref AgentNodePort
          TargetGroupArn: !Ref TargetGroup

Outputs:

  AgentNodeUrl:
    Description: Public URL of the agent node behind the ALB.
    Value: !Sub 'http://${LoadBalancer.DNSName}'

  ClusterName:
    Description: ECS cluster running the agent node.
    Value: !Ref Cluster

  ServiceName:
    Description: ECS service name.
    Value: !GetAtt Service.Name

  LogGroupName:
    Description: CloudWatch log group for the agent node.
    Value: !Ref LogGroup
